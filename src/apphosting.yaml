# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

# Environment variables and secrets.
env:
  - variable: PORT
    value: 4000
    availability:
      - RUNTIME
  - variable: NODE_ENV
    value: production
    availability:
      - RUNTIME
  - variable: MONGODB_URI
    value: ""
    availability:
      - RUNTIME
  - variable: CORS_ORIGIN
    value: "https://autoadvant.com"
    availability:
      - RUNTIME
  - variable: PUBLIC_API_URL
    value: ""
    availability:
      - RUNTIME
  - variable: STORAGE_ROOT
    value: "./apps/api/uploads"
    availability:
      - RUNTIME
  - variable: FIREBASE_PROJECT_ID
    value: ""
    availability:
      - RUNTIME
  - variable: FIREBASE_CLIENT_EMAIL
    value: ""
    availability:
      - RUNTIME
  - variable: FIREBASE_PRIVATE_KEY
    value: ""
    availability:
      - RUNTIME
  - variable: FIREBASE_DATABASE_URL
    value: ""
    availability:
      - RUNTIME
  - variable: SMTP_HOST
    value: ""
    availability:
      - RUNTIME
  - variable: SMTP_PORT
    value: "587"
    availability:
      - RUNTIME
  - variable: SMTP_SECURE
    value: "false"
    availability:
      - RUNTIME
  - variable: SMTP_USER
    value: ""
    availability:
      - RUNTIME
  - variable: SMTP_PASS
    value: ""
    availability:
      - RUNTIME
  - variable: MAIL_FROM
    value: "Auto Advant <autoadvantplatform@gmail.com>"
    availability:
      - RUNTIME
